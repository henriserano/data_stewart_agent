AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Data Steward MCP — Lambda-native (no LWA, no ASGI framework, no runtime SSM).

Parameters:
  OpenMetadataHost:
    Type: String
    Description: e.g. https://sandbox.open-metadata.org
  BearerTokenParamName:
    Type: String
    Description: SSM Parameter (SecureString) name for the MCP bearer token
    Default: /data-steward/mcp-bearer-token
  OpenMetadataJwtParamName:
    Type: String
    Description: SSM Parameter (SecureString) name for the OpenMetadata JWT
    Default: /data-steward/openmetadata-jwt
  LogRetentionDays:
    Type: Number
    Default: 3

Globals:
  Function:
    Timeout: 29
    MemorySize: 512
    Architectures: [arm64]
    Runtime: python3.12

Resources:
  DataStewardMcpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: data-steward-mcp
      CodeUri: src/
      Handler: app.handler
      Environment:
        Variables:
          OPENMETADATA_HOST: !Ref OpenMetadataHost
          OPENMETADATA_JWT_PARAM: !Ref OpenMetadataJwtParamName
          MCP_BEARER_TOKEN_PARAM: !Ref BearerTokenParamName
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Policies:
        - Statement:
            - Effect: Allow
              Action: [ssm:GetParameters]
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${BearerTokenParamName}
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${OpenMetadataJwtParamName}
            - Effect: Allow
              Action: [kms:Decrypt]
              Resource: !Sub arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/aws/ssm

  DataStewardMcpLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/${DataStewardMcpFunction}
      RetentionInDays: !Ref LogRetentionDays

Outputs:
  FunctionUrl:
    Description: Public URL. Wire into Claude Desktop / ChatGPT MCP.
    Value: !GetAtt DataStewardMcpFunctionUrl.FunctionUrl
  FunctionArn:
    Value: !GetAtt DataStewardMcpFunction.Arn
